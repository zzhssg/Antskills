// 综合评分计算
function computeScore(p, ctx) {
  const apy_n  = Math.min(p.apy30dAvg / 15, 1);          // 15% 封顶
  const sec_n  = p.secScore / 100;
  const stab_n = 1 - Math.min((p.apy30dStd / Math.max(p.apy30dAvg,0.1)), 1);

  // 便利分
  let conv_n;
  if (p.type === "flexible" && p.redeemH < 1) conv_n = 1;
  else if (p.type === "flexible") conv_n = 0.85;
  else if (p.lockDays <= 7) conv_n = 0.75;
  else if (p.lockDays <= 30) conv_n = 0.55;
  else conv_n = 0.30;

  // 容量分
  const cap_n = p.capacity === Infinity ? 1 :
                Math.min(p.capacity / Math.max(ctx.amount, 1), 1) * 0.85 + 0.15;

  // 权重 — 用户在 sidebar 设置
  const w = ctx.weights;
  return Math.round(100 * (
    w.apy*apy_n + w.sec*sec_n + w.conv*conv_n + w.cap*cap_n + w.stab*stab_n
  ));
}

function getWeights(secPriority, convPriority) {
  // 默认 PRD 权重
  let w = { apy:0.35, sec:0.25, conv:0.20, cap:0.10, stab:0.10 };
  if (secPriority === "tier1")   w = { apy:0.25, sec:0.40, conv:0.15, cap:0.10, stab:0.10 };
  if (secPriority === "loose")   w = { apy:0.45, sec:0.15, conv:0.20, cap:0.10, stab:0.10 };
  if (convPriority === "flex")   { w.conv += 0.10; w.apy -= 0.05; w.stab -= 0.05; }
  if (convPriority === "any")    { w.conv -= 0.05; w.apy += 0.05; }
  return w;
}

  if (n === Infinity) return "∞";
  if (n >= 1e9) return "$" + (n/1e9).toFixed(1) + "B";

  if (n >= 1e3) return "$" + (n/1e3).toFixed(0) + "K";
  return "$" + n.toFixed(0);
}

/* ════════════════════════════════════════════════════════════
   RADAR COMPARE
   ════════════════════════════════════════════════════════════ */
function RadarCompare({ products, scores }) {
  const ref = useRef(null);
  const [width, setWidth] = useState(600);

  useEffect(() => {
    if (!ref.current) return;
    const ro = new ResizeObserver(entries => {
      for (const e of entries) setWidth(e.contentRect.width);
    });
    ro.observe(ref.current);
    return () => ro.disconnect();
  }, []);

  useEffect(() => {
    if (!ref.current || width < 100 || products.length === 0) return;
    const svg = d3.select(ref.current).select("svg");
    svg.selectAll("*").remove();

    const W = width, H = 360;
    svg.attr("width", W).attr("height", H);

    const cx = W / 2, cy = H / 2;
    const radius = Math.min(W, H) / 2 - 60;

    const axes = [
      { key:"apy",  label:"收益 APY",   max:15 },
      { key:"sec",  label:"安全性",     max:100 },
      { key:"conv", label:"便利性",     max:100 },
      { key:"cap",  label:"容量",       max:100 },
      { key:"stab", label:"稳定性",     max:100 },
    ];
    const N = axes.length;
    const angle = (i) => (Math.PI * 2 * i / N) - Math.PI / 2;

    const g = svg.append("g").attr("transform", `translate(${cx},${cy})`);

    // 网格
    [0.2, 0.4, 0.6, 0.8, 1].forEach((r, i) => {
      const pts = axes.map((_, j) => {
        const a = angle(j);
        return [Math.cos(a) * radius * r, Math.sin(a) * radius * r];
      });
      g.append("path")
        .attr("d", "M" + pts.map(p => p.join(",")).join("L") + "Z")
        .attr("fill", i === 4 ? "rgba(255,255,255,0.012)" : "none")
        .attr("stroke", C.divider).attr("stroke-width", 0.8);
    });

    // 轴
    axes.forEach((ax, i) => {
      const a = angle(i);
      const x2 = Math.cos(a) * radius;
      const y2 = Math.sin(a) * radius;
      g.append("line").attr("x1", 0).attr("y1", 0).attr("x2", x2).attr("y2", y2)
        .attr("stroke", C.text5).attr("stroke-width", 0.6);
      // 标签
      const lx = Math.cos(a) * (radius + 22);
      const ly = Math.sin(a) * (radius + 22);
      g.append("text").attr("x", lx).attr("y", ly + 4).attr("text-anchor", "middle")
        .attr("fill", C.text3).attr("font-size", 10).attr("font-family", MF).attr("font-weight", 600)
        .text(ax.label);
    });

    // 各产品多边形
    const colors = [C.mint, C.coral, "#9b9eff", C.yl];
    products.forEach((p, idx) => {
      const stab = Math.max(0, 100 - (p.apy30dStd / Math.max(p.apy30dAvg, 0.1)) * 100);
      const conv = p.type === "flexible" && p.redeemH < 1 ? 100 :
                   p.type === "flexible" ? 85 :
                   p.lockDays <= 7 ? 75 : p.lockDays <= 30 ? 55 : 30;
      const cap = p.capacity === Infinity ? 100 : Math.min(p.capacity / 1e7, 1) * 100;
      const values = {
        apy: Math.min(p.apy / 15, 1),
        sec: p.secScore / 100,
        conv: conv / 100,
        cap: cap / 100,
        stab: stab / 100,
      };
      const pts = axes.map((ax, i) => {
        const a = angle(i);
        const v = values[ax.key];
        return [Math.cos(a) * radius * v, Math.sin(a) * radius * v];
      });
      const col = colors[idx % colors.length];
      g.append("path")
        .attr("d", "M" + pts.map(p => p.join(",")).join("L") + "Z")
        .attr("fill", col).attr("fill-opacity", 0.10)
        .attr("stroke", col).attr("stroke-width", 1.6);
      pts.forEach(pt => {
        g.append("circle").attr("cx", pt[0]).attr("cy", pt[1]).attr("r", 3).attr("fill", col);
      });
    });
  }, [width, products]);

  const colors = [C.mint, C.coral, "#9b9eff", C.yl];

  return (
    <Card style={{ animation:"fadeUp 0.5s ease 0.6s both" }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
        <div>
          <div style={{ fontSize:13, color:C.text1, fontWeight:700, marginBottom:4 }}>多维对比 · Radar</div>
          <div style={{ fontSize:10, color:C.text4, fontFamily:MF }}>
            勾选左侧任意行加入对比 · 最多 4 个 · 当前 {products.length}/4
          </div>
        </div>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1.2fr 1fr", gap:20 }}>
        <div ref={ref} style={{ width:"100%" }}><svg /></div>
        <div style={{ paddingLeft:12 }}>
          <div style={{ fontSize:10, color:C.text4, fontFamily:MF, letterSpacing:1, marginBottom:12 }}>SELECTED PRODUCTS</div>
          {products.length === 0 && (
            <div style={{ fontSize:11, color:C.text4, padding:"24px 0" }}>
              点击左侧产品行的复选框，选 2-4 个加入对比
            </div>
          )}
          {products.map((p, i) => (
            <div key={p.id} style={{
              display:"flex", alignItems:"center", gap:10,
              padding:"10px 12px", marginBottom:6,
              background:"rgba(255,255,255,0.02)",
              border:`1px solid ${colors[i]}40`, borderLeft:`3px solid ${colors[i]}`,
              borderRadius:"0 6px 6px 0",
            }}>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:12, fontWeight:700, color:C.text1 }}>{p.platform}</div>
                <div style={{ fontSize:10, color:C.text4 }}>{p.product}</div>
              </div>
              <div style={{
                fontSize:14, fontWeight:800, fontFamily:MF, color:colors[i],
              }}>{scores[p.id]}</div>
            </div>
          ))}
        </div>
      </div>
    </Card>
  );
}

            <br/>权重随你的左侧"安全/便利"旋钮动态变化
          </div>
        </div>
        <div style={{ padding:"14px 16px", background:"rgba(255,138,101,0.04)", borderLeft:`2px solid ${C.coral}`, borderRadius:"0 6px 6px 0" }}>
          <div style={{ fontSize:11, color:C.coral, fontWeight:700, marginBottom:6 }}>CEX 风险</div>
          <div style={{ fontSize:10, color:C.text3, lineHeight:1.7 }}>
            托管型理财存在平台破产/挪用风险。优先选择有储备金证明 (PoR) 的 Tier-1 平台。
          </div>
        </div>
        <div style={{ padding:"14px 16px", background:"rgba(255,91,107,0.04)", borderLeft:`2px solid ${C.red}`, borderRadius:"0 6px 6px 0" }}>
          <div style={{ fontSize:11, color:C.red, fontWeight:700, marginBottom:6 }}>DeFi 风险</div>
          <div style={{ fontSize:10, color:C.text3, lineHeight:1.7 }}>
            智能合约可能被黑、Oracle 故障、稳定币脱锚。审计 ≠ 安全，需关注 TVL 流入。
          </div>
        </div>
      </div>

      <div style={{
        display:"flex", alignItems:"center", justifyContent:"space-between",
        padding:"12px 16px", background:"rgba(20,232,184,0.04)",
        border:"1px solid rgba(20,232,184,0.15)", borderRadius:8, marginBottom:14,
      }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ display:"flex", gap:3 }}>
            {[1,2,3].map(i => <span key={i} style={{
              width:7, height:7, borderRadius:"50%", background:C.mint, boxShadow:`0 0 6px ${C.mint}`,
            }}/>)}
          </div>
          <div style={{ fontSize:11, color:C.text2 }}>
            <b style={{ color:C.mint }}>3 源验证</b> · DefiLlama Yields · CEX Earn API · CryptoQuant 储备证明
          </div>
        </div>
        <div style={{ fontSize:9, fontFamily:MF, color:C.text4 }}>
          <span style={{ display:"inline-block", width:6, height:6, borderRadius:"50%", background:C.mint, marginRight:6, animation:"pulse 2s infinite" }} />
          UPDATED 5 MIN AGO
        </div>
      </div>

      <div className="fold-btn" onClick={() => setOpenRaw(!openRaw)} style={{
        fontSize:11, color:C.text3, fontFamily:MF, fontWeight:600,
        padding:"8px 0", display:"flex", alignItems:"center", gap:6,
      }}>
        <span style={{ transform: openRaw ? "rotate(90deg)" : "rotate(0)", transition:"transform .15s" }}>▶</span>
        VIEW RAW PRODUCT JSON (top 3)

}

/* ════════════════════════════════════════════════════════════
   MAIN
   ════════════════════════════════════════════════════════════ */
function App() {
  const [params, setParams] = useState({
    asset:"USDC",
    venues:["CEX","DeFi"],
    amount:100000,
    secPriority:"balanced",
    convPriority:"balanced",
    kyc:"basic",
  });
  const [executed, setExecuted] = useState(false);
  const [loading, setLoading]   = useState(false);
  const [progress, setProgress] = useState(0);
  const [step, setStep]         = useState(0);
  const [selectedIds, setSelectedIds] = useState([]);

  // 筛选 + 评分
  const { ranked, scoreMap, totalCount, venueCount } = useMemo(() => {
    const ctx = {
      amount: params.amount,
      weights: getWeights(params.secPriority, params.convPriority),
    };
    const filtered = PRODUCTS.filter(p => params.venues.includes(p.venue));
    const scored = filtered.map(p => ({ ...p, _score: computeScore(p, ctx) }));
    scored.sort((a, b) => b._score - a._score);
    const sm = {};
    scored.forEach(p => sm[p.id] = p._score);
    const venues = new Set(scored.map(p => p.platform));
    return { ranked: scored, scoreMap: sm, totalCount: scored.length, venueCount: venues.size };
  }, [params]);

  // 默认选 TOP 3 入对比
  useEffect(() => {
    if (executed && ranked.length > 0 && selectedIds.length === 0) {
      setSelectedIds(ranked.slice(0, 3).map(p => p.id));
    }
  }, [executed, ranked]);

  const toggleSelect = (id) => {
    setSelectedIds(prev => {
      if (prev.includes(id)) return prev.filter(x => x !== id);
      if (prev.length >= 4) return prev;
      return [...prev, id];
    });
  };

  const onRun = () => {
    setExecuted(false); setLoading(true); setProgress(0); setStep(0);
    setSelectedIds([]);
    const total = 6; let s = 0;
    const tick = setInterval(() => {
      s++; setStep(s); setProgress((s + 1) / total * 100);
      if (s >= total - 1) {
        clearInterval(tick);
        setTimeout(() => { setLoading(false); setExecuted(true); }, 500);
      }
    }, 380);
  };

  const selectedProducts = ranked.filter(p => selectedIds.includes(p.id));

  return (
    <>
      <Sidebar params={params} setParams={setParams} onRun={onRun} loading={loading} />
      <div style={{ flex:1, padding:"24px 32px 60px", background:C.bg, overflow:"auto" }}>

        {/* status bar */}
        <div style={{
          display:"flex", alignItems:"center", justifyContent:"space-between",
          marginBottom:24, padding:"10px 16px",
          background:C.card, border:`1px solid ${C.border}`, borderRadius:8,
        }}>
          <div style={{ display:"flex", alignItems:"center", gap:14, fontSize:11, fontFamily:MF }}>
            <span style={{ color: executed ? C.mint : C.text4 }}>
              {executed ? "● [ok] 扫描完成" : loading ? "● 扫描中" : "○ 待执行"}
            </span>
            {executed && <>
              <span style={{ color:C.text4 }}>·</span>
              <span style={{ color:C.text3 }}>{totalCount} 个产品</span>
              <span style={{ color:C.text4 }}>·</span>
              <span style={{ color:C.text3 }}>{venueCount} 个平台</span>
              <span style={{ color:C.text4 }}>·</span>
              <span style={{ color:C.text3 }}>3.1s</span>
            </>}
          </div>
          <div style={{ display:"flex", gap:14, fontSize:11, fontFamily:MF, color:C.text3 }}>
            <span><VenueDot venue="CEX" />CEX</span>
            <span><VenueDot venue="DeFi" />DeFi</span>
          </div>
        </div>

        {/* empty state */}
        {!executed && !loading && (
          <div style={{ padding:"120px 60px", textAlign:"center" }}>
            <div style={{ fontSize:64, color:C.mint, fontFamily:DF, fontWeight:800, opacity:0.4, marginBottom:16, lineHeight:1 }}>¥</div>
            <div style={{ fontSize:20, color:C.text2, fontWeight:600, marginBottom:8, fontFamily:DF, fontStyle:"italic" }}>
              Where should your stablecoins sleep tonight?
            </div>
            <div style={{ fontSize:12, color:C.text4 }}>
              在左侧设定你的偏好，我会同时扫描 8 家 CEX 与 500+ DeFi 协议，帮你找出综合分最高的去处
            </div>
          </div>
        )}

        {loading && <LoadingPanel progress={progress} step={step} />}

        {executed && !loading && ranked.length > 0 && (
          <>
            {/* HERO */}
            <HeroTop
              topProduct={ranked[0]}
              topScore={ranked[0]._score}
              principal={params.amount}
              totalCount={totalCount}
              ctx={{ venueCount }}
            />

            {/* Section header */}
            <div style={{
              display:"flex", alignItems:"center", justifyContent:"space-between",
              marginTop:8, marginBottom:14,
            }}>
              <div style={{ display:"flex", alignItems:"baseline", gap:12 }}>
                <div style={{ fontSize:18, fontFamily:DF, fontWeight:700, color:C.text1, fontStyle:"italic" }}>
                  The Ranking
                </div>
                <div style={{ fontSize:11, color:C.text4, fontFamily:MF }}>
                  · 综合排行 · 按你的偏好加权
                </div>
              </div>
              <div style={{ fontSize:10, color:C.text4, fontFamily:MF, letterSpacing:0.8 }}>
                选 {selectedIds.length}/4 加入对比
              </div>
            </div>

            {/* Header row */}
            <div style={{
              display:"grid",
              gridTemplateColumns:"32px 36px 1fr 90px 84px 84px 84px 64px",
              gap:14, padding:"0 18px 8px",
              fontSize:9, color:C.text4, fontFamily:MF, fontWeight:700, letterSpacing:1,
            }}>
              <div></div>
              <div style={{ textAlign:"center" }}>#</div>
              <div>PRODUCT</div>
              <div>APY</div>
              <div style={{ textAlign:"center" }}>便利</div>
              <div style={{ textAlign:"center" }}>安全</div>
              <div style={{ textAlign:"center" }}>容量</div>
              <div style={{ textAlign:"right" }}>SCORE</div>
            </div>

            {/* Product rows */}
            <div style={{ marginBottom:14 }}>
              {ranked.map((p, i) => (
                <ProductRow
                  key={p.id} p={p} score={p._score} rank={i + 1}
                  selected={selectedIds.includes(p.id)}
                  onToggle={() => toggleSelect(p.id)}
                  principal={params.amount}
                />
              ))}
            </div>

            {/* Radar */}
            <div style={{ marginTop:18 }}>
              <RadarCompare products={selectedProducts} scores={scoreMap} />
            </div>

            {/* Trust */}
            <div style={{ marginTop:14 }}>
              <TrustLayer products={ranked} />
            </div>

            {/* footer */}
            <div style={{
              marginTop:24, padding:"16px 22px",
              fontSize:10, color:C.text4, fontFamily:MF, lineHeight:1.8,
              borderTop:`1px solid ${C.border}`,
            }}>
              DATA SOURCES · DefiLlama Yields · Binance Simple Earn · OKX Finance · Bybit Earn · Bitget · KuCoin · Gate.io · HTX · CryptoQuant ·
              通过 Antseer.ai 聚合 · UPDATED {new Date().toLocaleString("zh-CN")}
              <br/>
              ⚠ 本工具仅供信息参考，不构成任何投资建议。APY 与剩余容量随时变化，
              CEX 与 DeFi 均存在不同性质的风险，请在投入资金前充分了解相关风险。
            </div>
          </>
        )}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
