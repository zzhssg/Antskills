<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{SKILL_NAME}} — Powered by Antseer.ai</title>
<!-- Display Font — pick one not yet used (check SKILL.md §5) -->
<link href="https://fonts.googleapis.com/css2?family={{DISPLAY_FONT_URL}}&display=swap" rel="stylesheet">
<style>
/* ─── Design Tokens ─────────────────────────── */
:root {
  --accent: {{ACCENT_COLOR}};          /* e.g. #7c6aef */
  --accent-dim: {{ACCENT_COLOR}}33;    /* 20% opacity */
  --bg-primary: #0a0a0f;
  --bg-card: #13131a;
  --bg-card-hover: #1a1a24;
  --text-primary: #e8e8ed;
  --text-secondary: #8a8a9a;
  --text-muted: #55556a;
  --border: #1e1e2a;
  --success: #22c55e;
  --warning: #f59e0b;
  --danger: #ef4444;
  --font-display: '{{DISPLAY_FONT}}', serif;
  --font-body: system-ui, -apple-system, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --sidebar-width: 300px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ─── Layout ────────────────────────────────── */
.app {
  display: flex;
  max-width: 1440px;
  margin: 0 auto;
  min-height: 100vh;
}

.sidebar {
  width: var(--sidebar-width);
  border-right: 1px solid var(--border);
  padding: 24px 20px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  flex-shrink: 0;
}

.main {
  flex: 1;
  padding: 24px 32px;
  overflow-y: auto;
}

/* ─── Sidebar Components ────────────────────── */
.logo {
  font-family: var(--font-display);
  font-size: 22px;
  color: var(--accent);
  margin-bottom: 8px;
}

.tagline {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 32px;
  font-style: italic;
  font-family: var(--font-display);
}

.input-group {
  margin-bottom: 20px;
}

.input-group label {
  display: block;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.input-group select,
.input-group input {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  padding: 8px 12px;
  font-size: 14px;
  font-family: var(--font-body);
  outline: none;
  transition: border-color 0.2s;
}

.input-group select:focus,
.input-group input:focus {
  border-color: var(--accent);
}

.btn-primary {
  width: 100%;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: var(--radius-sm);
  padding: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 16px;
  transition: opacity 0.2s;
}

.btn-primary:hover { opacity: 0.85; }

/* ─── Hero Section ──────────────────────────── */
.hero {
  margin-bottom: 32px;
}

.hero-cards {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
}

.hero-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  position: relative;
  transition: border-color 0.3s;
}

.hero-card:hover { border-color: var(--text-muted); }

.hero-card.best {
  border-color: var(--accent);
  box-shadow: 0 0 20px var(--accent-dim);
}

.hero-card .rank {
  font-family: var(--font-display);
  font-size: 42px;
  color: var(--accent);
  font-weight: 300;
  line-height: 1;
}

.hero-card .platform {
  font-size: 16px;
  font-weight: 700;
  margin-top: 8px;
}

.hero-card .metric {
  font-family: var(--font-mono);
  font-size: 24px;
  color: var(--accent);
  margin-top: 8px;
}

.hero-card .one-liner {
  font-size: 12px;
  color: var(--text-secondary);
  font-style: italic;
  margin-top: 12px;
  font-family: var(--font-display);
}

/* ─── Section Headers ───────────────────────── */
.section-title {
  font-family: var(--font-display);
  font-size: 18px;
  color: var(--text-secondary);
  margin: 32px 0 16px;
  font-style: italic;
  letter-spacing: 0.5px;
}

/* ─── Ranking Grid ──────────────────────────── */
.ranking-row {
  display: grid;
  grid-template-columns: 40px 1fr 80px 80px 60px 80px 70px;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  transition: background 0.2s;
}

.ranking-row:hover { background: var(--bg-card-hover); }

.ranking-row.top1 {
  background: linear-gradient(90deg, var(--accent-dim), transparent);
}

.ranking-row .rank-num {
  font-family: var(--font-mono);
  color: var(--text-muted);
}

.ranking-row .apy {
  font-family: var(--font-mono);
  color: var(--accent);
  font-weight: 600;
}

/* ─── Trust Footer ──────────────────────────── */
.trust-footer {
  margin-top: 48px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
}

.trust-footer .method {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.8;
}

.collapsible {
  cursor: pointer;
  color: var(--text-muted);
  font-size: 12px;
  margin-top: 12px;
}

.collapsible-content {
  display: none;
  margin-top: 8px;
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  padding: 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  max-height: 300px;
  overflow-y: auto;
}

/* ─── Default State ─────────────────────────── */
.default-state {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 60vh;
  text-align: center;
}

.default-state h2 {
  font-family: var(--font-display);
  font-size: 24px;
  font-style: italic;
  color: var(--text-muted);
  font-weight: 300;
}

.default-state p {
  color: var(--text-muted);
  font-size: 13px;
  margin-top: 8px;
}

/* ─── Responsive ────────────────────────────── */
@media (max-width: 768px) {
  .app { flex-direction: column; }
  .sidebar {
    width: 100%;
    position: static;
    height: auto;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  .hero-cards { grid-template-columns: 1fr; }
  .ranking-row { grid-template-columns: 30px 1fr 70px 60px; }
}

/* ─── Footer ────────────────────────────────── */
.powered-by {
  text-align: center;
  padding: 24px;
  font-size: 11px;
  color: var(--text-muted);
}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">{{SKILL_LOGO_TEXT}}</div>
    <div class="tagline">{{SKILL_TAGLINE}}</div>

    <div class="input-group">
      <label>{{INPUT_1_LABEL}}</label>
      <select id="input1">
        <option value="option1">{{Option 1}}</option>
        <option value="option2">{{Option 2}}</option>
      </select>
    </div>

    <div class="input-group">
      <label>{{INPUT_2_LABEL}}</label>
      <input type="number" id="input2" value="{{DEFAULT_VALUE}}" />
    </div>

    <!-- {{Add more inputs}} -->

    <button class="btn-primary" onclick="runAnalysis()">
      ▶ {{CTA_TEXT}}
    </button>
  </aside>

  <!-- Main Content -->
  <main class="main" id="mainContent">
    <!-- Default state -->
    <div class="default-state" id="defaultState">
      <div>
        <h2>{{DEFAULT_HEADLINE}}</h2>
        <p>{{DEFAULT_SUBTEXT}}</p>
      </div>
    </div>

    <!-- Results (hidden by default) -->
    <div id="resultsArea" style="display:none;">

      <!-- Hero Cards -->
      <div class="hero">
        <div class="hero-cards" id="heroCards">
          <!-- Filled by JS -->
        </div>
      </div>

      <!-- Narrative -->
      <div class="section-title" id="narrativeTitle">{{NARRATIVE_SECTION_TITLE}}</div>
      <div id="narrativeContent"></div>

      <!-- Ranking Grid -->
      <div class="section-title">{{RANKING_SECTION_TITLE}}</div>
      <div id="rankingGrid"></div>

      <!-- Trust Footer -->
      <div class="trust-footer">
        <div class="method" id="trustMethod">
          {{METHODOLOGY_TEXT}}
        </div>
        <div class="collapsible" onclick="toggleRaw()">
          ▸ 原始数据 (JSON)
        </div>
        <div class="collapsible-content" id="rawJson"></div>
      </div>
    </div>
  </main>
</div>

<div class="powered-by">
  Mock Data — Powered by <a href="https://antseer.ai" style="color:var(--accent);text-decoration:none;">Antseer.ai</a>
</div>

    <div class="hero-card ${i === 0 ? 'best' : ''}">
      <div class="rank">#${i + 1}</div>
      <div class="platform">${p.platform}</div>

      <div class="one-liner">${p.one_liner || ''}</div>

      <span>${p.platform} · ${p.product_name}</span>

</body>
</html>
