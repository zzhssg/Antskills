<script type="text/babel">

/* ═══ HASH AVATAR ═══ */
function hashU32(s){let h=0x811c9dc5;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,0x01000193);}h^=h>>>16;h=Math.imul(h,0x85ebca6b);h^=h>>>13;return h>>>0;}
function renderAvatarCanvas(cv,addr,sz){if(!cv||!addr)return;const s=sz||22;cv.width=s*2;cv.height=s*2;cv.style.width=s+"px";cv.style.height=s+"px";const ctx=cv.getContext("2d");ctx.scale(2,2);const h=hashU32(addr.toLowerCase());const h1=h%360,h2=(h1+60+(h>>8)%120)%360;const bg=ctx.createLinearGradient(0,0,s,s);bg.addColorStop(0,`hsl(${h1},60%,45%)`);bg.addColorStop(1,`hsl(${h2},55%,38%)`);ctx.fillStyle=bg;ctx.fillRect(0,0,s,s);ctx.globalAlpha=.5;const cs=s/5;for(let y=0;y<5;y++)for(let x=0;x<3;x++){if(((h>>((y*3+x)%30))&1)||(x===1&&y===2)){ctx.fillStyle=`hsl(${(h1+120)%360},70%,60%)`;ctx.fillRect(x*cs,y*cs,cs,cs);if(x<2)ctx.fillRect((4-x)*cs,y*cs,cs,cs);}}ctx.globalAlpha=1;}
function Avatar({addr,size=36}){const h=useMemo(()=>{let v=0;for(let i=0;i<addr.length;i++)v=((v<<5)-v+addr.charCodeAt(i))|0;return Math.abs(v);},[addr]);const hue=h%360,cs=size/5,px=[];for(let y=0;y<5;y++)for(let x=0;x<3;x++)if(((h>>((y*3+x)%30))&1)||(x===1&&y===2)){px.push({x,y});if(x<2)px.push({x:4-x,y});}return <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{borderRadius:"50%",flexShrink:0}}><rect width={size} height={size} fill={`hsl(${hue},18%,14%)`}/>{px.map((p,i)=><rect key={i} x={p.x*cs} y={p.y*cs} width={cs} height={cs} fill={`hsl(${hue},65%,60%)`} opacity={.9}/>)}</svg>;}
function WL({r}){return <div style={{display:"flex",gap:3}}>{r.map((v,i)=><div key={i} style={{width:14,height:14,borderRadius:3,background:v?C.up:C.dn,opacity:i<7?.4:1,fontSize:7,display:"flex",alignItems:"center",justifyContent:"center",color:"#000",fontWeight:700}}>{v?"W":"L"}</div>)}</div>;}

/* ═══ LOADING STATE ═══ */
const LOAD_STEPS={
  scanner:["连接 Hyperliquid API...","扫描大额持仓地址...","计算历史胜率...","检测共振信号...","生成共识分析..."],
  analyzer:["获取地址交易记录...","聚合 Round Trips...","计算胜率与盈亏比...","分析交易风格...","生成跟单评估..."],

function LoadingState({skill,sk,coin,addr}){
  const[step,setStep]=useState(0);
  const steps=LOAD_STEPS[sk]||LOAD_STEPS.scanner;
  useEffect(()=>{setStep(0);const timers=steps.map((_,i)=>setTimeout(()=>setStep(i),i*280));return()=>timers.forEach(clearTimeout);},[sk]);
  const pct=Math.min(100,((step+1)/steps.length)*100);
  return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"60vh"}}><div style={{textAlign:"center",width:320}}>
    <div style={{fontSize:44,marginBottom:20,animation:"pulse 1.8s ease infinite"}}>{skill.icon}</div>
    <div style={{color:C.text1,fontSize:16,fontWeight:700,marginBottom:6}}>{sk==="scanner"?`扫描 ${coin} 聪明钱`:`分析 ${addr||"地址"}`}</div>
    {/* Progress bar */}
    <div style={{width:"100%",height:4,borderRadius:2,background:"rgba(255,255,255,0.06)",overflow:"hidden",marginBottom:16}}>

      {steps.map((s,i)=><div key={i} style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",color:i===step?C.text3:C.text4,fontSize:12,fontFamily:MF,transition:"opacity .2s, transform .2s",opacity:i===step?1:0,transform:i===step?"translateY(0)":i<step?"translateY(-12px)":"translateY(12px)"}}>{i<=step?"✓ ":""}{s}</div>)}
    </div>
    {/* Step dots */}
    <div style={{display:"flex",justifyContent:"center",gap:6,marginTop:14}}>
      {steps.map((_,i)=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:i<=step?skill.accent:C.text4+"40",transition:"background .2s,transform .2s",transform:i===step?"scale(1.3)":"scale(1)"}}/>)}
    </div>
  </div></div>;
}

/* ═══ RADAR CHART (6 dimensions + hover tooltip) ═══ */
function RadarChart({values,rawData,size=280}){
  const[hover,setHover]=useState(null);
  const N=6;
  const labels=["胜率","盈亏比","资金量","绝对收益","稳定性","近期状态"];
  const keys=["winRate","profitRatio","capital","absPnl","stability","recentForm"];
  const tooltips=[
    rawData?`胜率 = ${rawData.wins}胜 / ${rawData.total}笔 = ${rawData.wr}%`:`胜率 = 盈利笔数 / 总笔数`,
    rawData?`盈亏比 = 均赢$${(rawData.avgWin/1000).toFixed(1)}K / 均亏$${(Math.abs(rawData.avgLoss)/1000).toFixed(1)}K = ${rawData.pr}:1`:`盈亏比 = 平均盈利 / 平均亏损`,
    rawData?`平均仓位 ${fmt(rawData.positions?.[0]?.size||0)}，log归一化`:`资金量 = 平均仓位 log归一化`,
    rawData?`30D总盈亏 +${fmt(rawData.pnl30d)}，log归一化`:`绝对收益 = 30日PnL log归一化`,
    rawData?`MDD = ${rawData.mdd}%，分数 = 100 - |MDD|×5`:`稳定性 = 100 - |最大回撤| × 5`,
    rawData?`近7日胜率 / 总体胜率 的比值 × 100`:`近期状态 = 7日胜率 vs 总体胜率`,
  ];
  const cx=size/2,cy=size/2,r=size*.25;
  const ang=i=>(Math.PI*2*i)/N-Math.PI/2;
  const pts=keys.map((k,i)=>({x:cx+Math.cos(ang(i))*r*(values[k]/100),y:cy+Math.sin(ang(i))*r*(values[k]/100),v:values[k]}));
  const pathD=pts.map((p,i)=>`${i===0?"M":"L"} ${p.x} ${p.y}`).join(" ")+" Z";
  const avg=Math.round(keys.reduce((s,k)=>s+values[k],0)/N);
  const grade=avg>=85?"S":avg>=75?"A+":avg>=65?"A":avg>=55?"B+":avg>=45?"B":"C";
  const gradeColor=avg>=75?C.yl:avg>=55?C.up:C.text3;

  return <div style={{display:"inline-flex",flexDirection:"column",alignItems:"center",position:"relative"}}>
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {[.25,.5,.75,1].map((lv,li)=><polygon key={li} points={Array.from({length:N},(_,i)=>`${cx+Math.cos(ang(i))*r*lv},${cy+Math.sin(ang(i))*r*lv}`).join(" ")} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth=".8"/>)}
      {Array.from({length:N},(_,i)=><line key={i} x1={cx} y1={cy} x2={cx+Math.cos(ang(i))*r} y2={cy+Math.sin(ang(i))*r} stroke={hover===i?"rgba(252,213,53,0.3)":"rgba(255,255,255,0.06)"} strokeWidth={hover===i?"1.5":".8"} style={{transition:"all .15s"}}/>)}
      <path d={pathD} fill={C.yl+"15"} stroke={C.yl} strokeWidth="2"/>
      {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r={hover===i?5:3} fill={hover===i?"#fff":C.yl} stroke={hover===i?C.yl:"none"} strokeWidth="2" style={{transition:"all .15s"}}/>)}
      {labels.map((l,i)=>{
        const d=r+32;
        const lx=cx+Math.cos(ang(i))*d,ly=cy+Math.sin(ang(i))*d;
        const hx=lx,hy=ly;
        // Adjust anchor based on position: left/right/center
        const a=ang(i),isLeft=Math.cos(a)<-0.3,isRight=Math.cos(a)>0.3;
        const anchor=isLeft?"end":isRight?"start":"middle";
        return <React.Fragment key={i}>
          <text x={lx} y={ly} textAnchor={anchor} dominantBaseline="middle" style={{transition:"all .12s"}}>
            <tspan fill={hover===i?C.text1:C.text3} fontSize="11" fontFamily={SF} fontWeight={hover===i?"700":"400"}>{l} </tspan>
            <tspan fill={hover===i?C.yl:C.text2} fontSize="12" fontFamily={MF} fontWeight="700">{pts[i].v}</tspan>
          </text>
          <circle cx={hx} cy={hy} r={24} fill="transparent" style={{cursor:"pointer"}} onMouseEnter={()=>setHover(i)} onMouseLeave={()=>setHover(null)}/>
        </React.Fragment>;
      })}
      <text x={cx} y={cy-5} textAnchor="middle" dominantBaseline="middle" fill={gradeColor} fontSize="26" fontWeight="800" fontFamily={MF}>{grade}</text>
      <text x={cx} y={cy+14} textAnchor="middle" dominantBaseline="middle" fill={C.text4} fontSize="10" fontFamily={MF}>{avg}分</text>
    </svg>
    {/* Hover tooltip */}
    {hover!==null&&<div style={{position:"absolute",bottom:-8,left:"50%",transform:"translateX(-50%)",padding:"6px 12px",borderRadius:6,background:"rgba(11,14,17,.96)",border:`1px solid ${C.yl}30`,fontSize:11,color:C.text2,fontFamily:MF,whiteSpace:"nowrap",boxShadow:"0 6px 20px rgba(0,0,0,.5)",backdropFilter:"blur(8px)",zIndex:5,animation:"fadeIn .15s ease"}}>{tooltips[hover]}</div>}
  </div>;
}
function SampleOverlay(){return <div style={{position:"absolute",inset:0,pointerEvents:"none",overflow:"hidden",zIndex:10}}>{Array.from({length:4},(_,i)=><div key={i} style={{position:"absolute",top:`${18+i*22}%`,left:"50%",transform:"translate(-50%,-50%) rotate(-18deg)",fontSize:44,fontWeight:800,fontFamily:MF,color:"rgba(255,255,255,0.025)",letterSpacing:18,whiteSpace:"nowrap",userSelect:"none"}}>SAMPLE DATA</div>)}</div>;}
function SampleBanner(){return <div style={{background:"rgba(252,213,53,0.08)",border:"1px solid rgba(252,213,53,0.2)",borderRadius:8,padding:"10px 16px",display:"flex",alignItems:"center",gap:10,marginBottom:16}}><span style={{fontSize:16}}>📋</span><span style={{fontSize:13,color:C.text2}}>以下为<span style={{color:C.yl,fontWeight:600}}>样例数据</span>。点击左侧「开始分析」获取实时结果。</span></div>;}

/* ═══ CANDLE GENERATOR ═══ */
const COIN_CFG={BTC:{base:94500,vol:.008},ETH:{base:3380,vol:.012},SOL:{base:168,vol:.018},DOGE:{base:.168,vol:.025},WIF:{base:1.42,vol:.03}};
const PERIODS=[{l:"1m",sec:60},{l:"5m",sec:300},{l:"15m",sec:900},{l:"1h",sec:3600},{l:"4h",sec:14400},{l:"1D",sec:86400}];
function genCandleData(coin,pSec,n=120){const cfg=COIN_CFG[coin]||COIN_CFG.BTC;const now=Math.floor(Date.now()/1000),anc=Math.floor(now/pSec)*pSec;const d=[];let prev=cfg.base;for(let i=n-1;i>=0;i--){const idx=n-1-i,t=anc-i*pSec,v=cfg.base*cfg.vol;const wave=Math.sin(idx/5.2)*v*.9+Math.cos(idx/13.5)*v*.6+Math.sin(idx/2.8)*v*.2;const trend=idx*v*.005;const base=cfg.base*.98+trend+wave;const cl=cfg.base>=1?Math.round(base*100)/100:+base.toPrecision(4);const op=cfg.base>=1?Math.round(prev*100)/100:+prev.toPrecision(4);const sp=v*.2;const hi=Math.max(op,cl)+sp+Math.abs(Math.sin(idx/4.1))*sp*1.4;const lo=Math.min(op,cl)-sp-Math.abs(Math.cos(idx/3.7))*sp*1.3;d.push({time:t,open:op,high:cfg.base>=1?Math.round(hi*100)/100:+hi.toPrecision(4),low:cfg.base>=1?Math.round(lo*100)/100:+lo.toPrecision(4),close:cl,volume:Math.round(40+Math.random()*200)});prev=cl;}return d;}

/* ═══════════════════════════════════════════════════════
   SHARED CHART COMPONENT (TradingView Lightweight Charts)
   ═══════════════════════════════════════════════════════ */
function SmartMoneyChart({markers=[],defaultCoin="BTC",coins=["BTC","ETH","SOL"],height=340}){
  const ctnRef=useRef(null),chartRef=useRef(null),serRef=useRef(null),volRef=useRef(null),mlRef=useRef(null);

        <div style={{fontSize:12,color:C.text3,lineHeight:1.7,padding:"10px 12px",background:C.card,borderRadius:8,border:`1px solid ${C.cardBorder}`,borderLeft:`3px solid ${skill.accent}40`}}>{skill.desc}</div>
        {sk==="scanner"&&<><div><div style={{fontSize:12,color:C.text3,marginBottom:6,fontWeight:500}}>选择币对</div><div style={{display:"flex",flexWrap:"wrap",gap:5}}>{["BTC","ETH","SOL","DOGE","WIF"].map(c=><button key={c} className="coin-btn" onClick={()=>setCoin(c)} style={{padding:"6px 14px",borderRadius:6,border:coin===c?`1px solid ${skill.accent}`:"1px solid "+C.cardBorder,background:coin===c?skill.accent+"15":C.card,color:coin===c?skill.accent:C.text3,cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:MF}}>{c}</button>)}</div></div><div><div style={{fontSize:12,color:C.text3,marginBottom:6,fontWeight:500}}>时间窗口</div><div style={{display:"flex",gap:5}}>{["30m","1h","4h","24h"].map(t=><button key={t} className="coin-btn" onClick={()=>setTw(t)} style={{padding:"6px 12px",borderRadius:6,border:tw===t?`1px solid ${skill.accent}`:"1px solid "+C.cardBorder,background:tw===t?skill.accent+"15":C.card,color:tw===t?skill.accent:C.text3,cursor:"pointer",fontSize:12,fontFamily:MF}}>{t}</button>)}</div></div></>}
        {sk==="analyzer"&&<><div><div style={{fontSize:12,color:C.text3,marginBottom:6,fontWeight:500}}>输入地址</div><input value={ai} onChange={e=>setAi(e.target.value)} placeholder="0x..." style={{width:"100%",padding:"10px 12px",borderRadius:6,border:"1px solid "+C.cardBorder,background:C.card,color:C.text2,fontSize:13,fontFamily:MF}}/></div><div><div style={{fontSize:12,color:C.text3,marginBottom:6,fontWeight:500}}>或选择已知地址</div><div style={{display:"flex",flexDirection:"column",gap:4}}>{A_PRESETS.map((a,i)=><button key={i} className="preset-btn" onClick={()=>{setSp(i);setAi(a.addr);}} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:6,border:"none",textAlign:"left",background:sp===i?C.yl+"0a":C.card,cursor:"pointer"}}><Avatar addr={a.full} size={22}/><div style={{flex:1}}><div style={{fontSize:12,color:sp===i?C.yl:C.text3,fontWeight:600}}>「{a.nick}」</div><div style={{fontSize:10,color:C.text4,fontFamily:MF}}>{a.addr}</div></div><span style={{fontSize:12,color:C.up,fontFamily:MF}}>{a.wr}%</span></button>)}</div></div></>}
        <button className="exec-btn" onClick={go} disabled={run} style={{width:"100%",padding:"12px 0",borderRadius:8,border:"none",background:run?skill.accent+"28":`linear-gradient(135deg,${skill.accent},${skill.accentAlt})`,color:run?skill.accent:"#000",fontSize:14,fontWeight:700,cursor:run?"wait":"pointer",fontFamily:SF,letterSpacing:2}}>{run?"分析中...":"▶ 开始分析"}</button>
        <div style={{marginTop:"auto",fontSize:10,color:C.text4,fontFamily:MF,lineHeight:1.6}}>数据源 Hyperliquid API<br/>⚠ 不构成投资建议</div>
      </div>
    </div>
    <div style={{flex:1,padding:"20px 36px",overflowY:"auto",maxHeight:"100vh"}}>{run?<LoadingState skill={skill} sk={sk} coin={coin} addr={ai||A_PRESETS[sp].addr}/>:<div className="content-fade" style={{maxWidth:1200,width:"100%"}}>{sk==="scanner"&&<ScannerOut isSample={!live} coin={coin} onAnalyze={handleAnalyze}/>}{sk==="analyzer"&&<AnalyzerOut isSample={!live}/>}</div>}</div>
  </div>;
}
ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
</body>
</html>
